name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual re-runs from the Actions UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel in-progress deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Cache: npm dependencies ────────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      # ── Cache: Elm package downloads ──────────────────────────────────────
      - name: Cache Elm packages
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: elm-${{ hashFiles('elm.json') }}
          restore-keys: |
            elm-

      # ── Cache: elm-pages generated code ───────────────────────────────────
      - name: Cache elm-pages codegen
        uses: actions/cache@v4
        with:
          path: .elm-pages
          key: elm-pages-${{ hashFiles('elm.json', 'package.json') }}
          restore-keys: |
            elm-pages-

      - name: Install npm dependencies
        run: npm ci

      - name: Inject build metadata
        run: bash scripts/inject-build-meta.sh
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}

      - name: Build elm-pages site
        run: npx elm-pages build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        run: bash scripts/smoke-test.sh
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
